version: "3.9"

services:
  api:
    build: .
    container_name: ai-document-generator
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports   # PDF-файлы на хосте
      - ./data:/app/data         # SQLite БД на хосте
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Telegram-бот (опционально — включи через TELEGRAM_ENABLED=true)
  bot:
    build: .
    container_name: ai-document-generator-bot
    restart: unless-stopped
    command: ["python", "bot.py"]
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports
      - ./data:/app/data
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - telegram   # docker compose --profile telegram up
